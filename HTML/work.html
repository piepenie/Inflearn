<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>개발 도서 대여 신청서</title>
  </head>
  <body>
    <style>
      body {
        max-width: 760px;
        margin: 40px auto;
        padding: 0 20px 48px;
        font-family: sans-serif;
        line-height: 1.6;
        background-color: yellow;
      }

      main {
        padding: 8px 0;
      }

      section {
        padding: 20px;
        margin-bottom: 24px;
        border: 1px solid #d8c8ad;
        border-radius: 12px;
      }

      h2,
      h4 {
        margin-top: 0;
      }

      a {
        color: #8a4b18;
        font-weight: bold;
      }

      label {
        display: block;
        margin-top: 12px;
        font-weight: bold;
      }

      input,
      button {
        display: block;
        width: 100%;
        box-sizing: border-box;
        margin: 8px 0 16px;
        padding: 8px;
        border: 1px solid #c7b28f;
        border-radius: 8px;
      }

      button {
        color: white;
        font-weight: bold;
      }
    </style>

    <header>
      <h1>개발 도서 대여 신청서</h1>
      <p>읽고 싶은 개발 도서를 대여하기 위해 작성하는 페이지입니다.</p>
    </header>

    <main>
      <section>
        <h2>신청 안내</h2>
        <p>도서 제목과 이름을 입력하면 담당자가 확인합니다.</p>
      </section>

      <section>
        <h2>참고 링크</h2>
        <ul>
          <li><a href="https://developer.mozilla.org/ko/">MDN Web Docs</a></li>
          <li><a href="https://github.com/">GitHub</a></li>
        </ul>
      </section>

      <section>
        <h2>신청 메모</h2>
        <div>
          <h3>읽고 싶은 이유</h3>
          <p>서버와 데이터가 어떻게 연결되는지 알고 싶습니다.</p>
        </div>
      </section>

      <section>
        <h2>도서 대여 폼</h2>
        <p>이름과 읽고 싶은 도서 제목을 입력합니다.</p>

        <form onsubmit="sendBookRequest(event)">
          <label for="student-name">이름</label>
          <input id="student-name" name="student-name" type="text" placeholder="이름" />

          <label for="book-title">도서 제목</label>
          <input id="book-title" name="book-title" type="text" placeholder="읽고 싶은 도서 제목" />

          <button type="submit">대여 신청하기</button>
        </form>

        <p id="request-result">신청 결과: 아직 요청된 도서가 없습니다.</p>
      </section>
    </main>

    <script>
      function sendBookRequest(event) {
        event.preventDefault();

        const studentName = document.getElementById("student-name").value;
        const bookTitle = document.getElementById("book-title").value;

        if (studentName === "" || bookTitle === "") {
          alert("이름과 도서 제목을 모두 입력해 주세요.");
          return;
        }

        const agreed = confirm(studentName + " 도서 대여 신청을 보낼까요?");

        if (agreed) {
          document.getElementById("request-result").textContent =
            "신청 결과: " + studentName + " 님은 '" + bookTitle + "' 도서를 대여하고 싶어 합니다.";
          alert("대여하고 싶어 합니다.");
        }
      }
    </script>
  </body>
</html>
